<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feed</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <h1><span id="home-link" style="cursor:pointer">[feed]</span></h1>

  <div class="controls">
    <input type="date" id="begin-date">
    <label>→</label>
    <input type="date" id="end-date">
    <button id="this-week">Wk</button>
    <button id="this-month">Mo</button>
    <button id="this-year">Yr</button>
    <button id="all-time" title="All time">∞</button>
    <a href="https://github.com/robertvigil/pglite-feed" target="_blank" rel="noopener" title="Help / docs" class="help-link">?</a>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder='Search — "keyword" (AND), "-exclude", "#tag", "#" for tag cloud' autocomplete="off">
    <span id="clear-search" title="Clear search">&times;</span>
  </div>

  <div class="action-bar" id="action-bar" style="display:none">
    <button id="create-toggle" title="New entry">✚</button>
    <button id="save-json" title="Save JSON">↓</button>
    <button id="open-json" title="Open JSON">↑</button>
    <input type="file" id="json-input" accept=".json" style="display:none">
  </div>
  <form class="create-form" id="create-form">
    <input type="date" id="new-date" required>
    <input type="text" id="new-content" class="content-input" placeholder="content (use #tags for categories)" required>
    <div class="actions">
      <button type="submit" title="Save">✓</button>
      <button type="button" class="cancel" id="create-cancel" title="Cancel">↺</button>
    </div>
  </form>

  <div id="output">Loading...</div>
  <div id="totals" class="totals" style="display:none"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
